# DoR AAAI-2027 space-sweep experiment design (record; see docs/aaai2027/experiment_matrix.md)
# train_grpo.py uses argparse, not this file -- this is the canonical design spec the
# RUN.md commands implement. Keep in sync with src/dor/reward_spaces.py:ARMS.

reward_arms:            # verifiable GT distance D, moving post-decode -> pre-decode
  - pixel               # A0 -LPIPS                     RLVR-World baseline
  - mse                 # A1 -MSE
  - ssim                # A2 SSIM                        (needs piqa)
  - floor               # A3 floor-calibrated pixel      *** key baseline; see floor_note ***
  - multi               # A4 ToolRL-style multi-component
  - phi                 # A5 -RMS(pre-quant features)
  - code                # A6 -RMS(FSQ codes)  == DoR     *** method ***
  # - hybrid            # alpha*z(pixel)+(1-alpha)*z(code); optional

advantage_modes:        # dor.rewards.MODES; consensus is an ablation only
  - gt_only             # headline
  # - hybrid_mult       # consensus-shaped advantage (ablation arm)

controls:
  - base                # C0 pre-RL checkpoint (no training)
  - sft_mle             # C1 MLE continue-train (no RL) lower bound
  - pixel_largeG        # C2 A0 with K in {32,64} (compute control)

protocol:
  base_ckpt: thuml/rt1-world-model-single-step-base   # same start for every arm
  K: 16
  steps: 150            # B1: lengthen from the 40-step proof-of-concept
  seeds: [0, 1, 2, 3, 4]
  eval_every: 10
  domain: rt1_single_step             # B3 adds RECON (vid2world) + multi-step on H800

eval_metrics:           # independent of training objective (code_rms -> appendix only)
  primary: [lpips, psnr]
  video: [fvd]          # R1: needs short rollout; single-step may use FID proxy
  dynamics: [flow_consistency]        # RAFT optical-flow agreement
  reference: dino_cos   # DINOv2 held-out, rank-preservation only -- NEVER a reward arm

floor_note: |
  A3 must subtract a PER-SAMPLE floor estimate, not a constant. A constant offset is
  rank-invariant (Spearman unchanged), so constant-floor A3 == A0 in within-group
  ranking and would be a strawman. Use per-window (or per-region) phi_tok.

compute:
  rtx5090_32g: [B0_cache, B0_rank, B1_train_rt1, B2_theory, B4_qualitative, B5_ablation]
  h800_80g:    [B3_longer_train, B3_recon_domain, B3_multistep, C2_largeG]
